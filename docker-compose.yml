services:
  triage-api:
    build:
      context: .
      dockerfile: apps/triage-api/Dockerfile
      target: dev
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_BASE_URL=http://localhost:3000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -lc "npm install --no-audit --no-fund && npm run dev -w triage-api"

  frontend-pwa:
    build:
      context: .
      dockerfile: apps/frontend-pwa/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    env_file:
      - .env
    depends_on:
      triage-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -lc "npm install --include=optional --no-audit --no-fund && npm run predev -w frontend-pwa && npm run dev -w frontend-pwa"
